<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — Herman John Boock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>

  :root{
    --paper: #F1ECE1;
    --paper-raised: #E8E1D2;
    --ink: #201D18;
    --ink-soft: #55503F;
    --ink-faint: #8B8474;
    --rule: #CFC5AC;
    --accent: #2F4A3C;
    --font-display: 'Roboto', sans-serif;
    --font-body: 'Roboto', sans-serif;
    --gutter: clamp(24px, 6vw, 64px);

    --serious-bg: #14161A;
    --serious-bg-raised: #1D2026;
    --serious-text: #F2F1ED;
    --serious-text-soft: #A6A9B0;
    --serious-accent: #7FBF9E;
    --serious-border: rgba(255,255,255,0.08);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(47,74,60,0.03), transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(139,94,60,0.03), transparent 45%);
    transition: background-color 0.4s ease, color 0.4s ease;
  }

  a{ color: inherit; text-decoration: none; }

  .wrap{
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 var(--gutter);
  }

  .nav{
    position: sticky;
    top:0;
    z-index: 10;
    background: rgba(241,236,225,0.9);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--rule);
  }
  .nav .wrap{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding-top: 18px;
    padding-bottom: 18px;
  }
  .back-link{
    font-size: 14px;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-link:hover{ color: var(--accent); }
  .nav-email{
    font-size: 14px;
    color: var(--ink-soft);
  }
  .nav-email:hover{ color: var(--accent); }

  main{ padding: 64px 0 100px; }
  .page-title{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(30px, 4vw, 40px);
    margin: 0 0 16px;
  }
  .page-sub{
    color: var(--ink-soft);
    font-style: italic;
    max-width: 560px;
    margin: 0 0 48px;
  }

  .download-row{
    margin-bottom: 32px;
  }
  .download-btn{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    padding: 12px 22px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
  }
  .download-btn:hover{ opacity: 0.9; }

  a:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  /* ============ SERIOUS MODE ============ */
  body.serious{
    background: var(--serious-bg);
    background-image: none;
    color: var(--serious-text);
  }
  body.serious .nav{
    background: rgba(20,22,26,0.9);
    border-bottom: 1px solid var(--serious-border);
  }
  body.serious .back-link{ color: var(--serious-text-soft); }
  body.serious .back-link:hover{ color: var(--serious-accent); }
  body.serious .nav-email{ color: var(--serious-text-soft); }
  body.serious .nav-email:hover{ color: var(--serious-accent); }
  body.serious .page-sub{ color: var(--serious-text-soft); }
  body.serious .download-btn{ background: var(--serious-accent); color: var(--serious-bg); }

</style>
</head>
<body>

  <script>
    (function(){
      var stored = localStorage.getItem('hjb-serious-mode');
      var isSerious = stored === null ? true : stored === 'true';
      if (isSerious) document.body.classList.add('serious');
    })();
  </script>

  <nav class="nav">
    <div class="wrap">
      <a href="index.html" class="back-link">&larr; Back</a>
      <a href="mailto:hermanboock@gmail.com" class="nav-email">hermanboock@gmail.com</a>
    </div>
  </nav>

  <main>
    <div class="wrap">
      <h1 class="page-title">CV</h1>

      <div class="download-row">
        <a href="Herman-Boock-CV.pdf" download="Herman Boock - CV.pdf" class="download-btn">Download PDF</a>
      </div>

      <p class="page-sub">If you find a typo, let's call it an attention-to-detail test&hellip;</p>
    </div>
  </main>

</body>
</html>
